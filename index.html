  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

p(36px,5vw,60px);align-items:center\">\n    <div style=\"display:flex;flex-direction:column;align-items:flex-start;text-align:left\">\n      <div style=\"display:inline-flex;align-items:center;gap:9px;padding:8px 16px;background:#fff;border:1px solid #e4e4e7;color:#3f3f46;border-radius:100px;font:600 13px 'Hanken Grotesk',sans-serif;margin-bottom:clamp(22px,3vw,30px);animation:riseIn .6s both\" id=\"hero-badge\"><span style=\"width:8px;height:8px;border-radius:50%;background:#111111;display:inline-block;animation:pulseDot 2.4s infinite\"><\u002Fspan>Disponible para nuevos proyectos<\u002Fdiv>\n      <h1 style=\"font:700 clamp(38px,6vw,62px)/1.04 'Bricolage Grotesque',sans-serif;letter-spacing:-.03em;margin:0 0 22px;max-width:15ch;animation:riseIn .7s .06s both\">Que la tecnología trabaje por ti, <span style=\"color:#a1a1aa\">no al revés<\u002Fspan><\u002Fh1>\n      <p style=\"font:400 clamp(17px,2.2vw,21px)/1.55 'Hanken Grotesk',sans-serif;color:#52525b;max-width:520px;margin:0 0 clamp(28px,4vw,40px);animation:riseIn .7s .14s both\">Automatizo tareas, implemento IA y construyo el software y los dashboards que tu negocio necesita para crecer con calma.<\u002Fp>\n      <div style=\"display:flex;gap:12px;flex-wrap:wrap;animation:riseIn .7s .22s both\">\n        <a href=\"#contacto\" style=\"padding:16px 32px;background:var(--brand);color:#f4f4f5;border-radius:100px;font:700 15px 'Hanken Grotesk',sans-serif;transition:opacity .2s\" style-hover=\"opacity:.85\">Agenda una llamada gratis<\u002Fa>\n        <a href=\"#servicios\" style=\"padding:16px 32px;background:#fff;border:1px solid #e4e4e7;border-radius:100px;font:600 15px 'Hanken Grotesk',sans-serif;transition:border-color .2s\" style-hover=\"border-color:#111111\">Ver servicios<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"justify-self:center;width:100%;max-width:440px;animation:riseIn .8s .3s both\">\n      <div id=\"dotgrid-panel\" style=\"position:relative;aspect-ratio:1;border-radius:40px;overflow:hidden;background:radial-gradient(120% 120% at 50% 45%,#141414 0%,#111111 55%,#0d0d0d 100%);cursor:crosshair;-webkit-mask-image:radial-gradient(135% 135% at 50% 50%,#000 55%,rgba(0,0,0,.45) 82%,transparent 100%);mask-image:radial-gradient(135% 135% at 50% 50%,#000 55%,rgba(0,0,0,.45) 82%,transparent 100%)\">\n        <canvas id=\"dotgrid\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block\"><\u002Fcanvas>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== TRUST STRIP ===== -->\n  <div id=\"trust-strip\" style=\"max-width:1000px;margin:0 auto;padding:clamp(28px,4vw,44px) clamp(20px,4vw,44px) clamp(48px,7vw,72px)\">\n    <div style=\"display:flex;flex-wrap:wrap;justify-content:center;gap:10px 26px;font:500 13.5px 'Hanken Grotesk',sans-serif;color:#71717a\">\n      <span>100% remoto en todo Chile<\u002Fspan><span style=\"color:#d0c7b8\">•<\u002Fspan><span>Respuesta en menos de 24 h<\u002Fspan><span style=\"color:#d0c7b8\">•<\u002Fspan><span>Sin permanencia ni letra chica<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== SERVICIOS ===== -->\n  <div id=\"servicios\" style=\"max-width:1120px;margin:0 auto;padding:clamp(40px,6vw,68px) clamp(20px,4vw,44px);scroll-margin-top:72px\">\n    <div data-reveal=\"0\" style=\"text-align:center;margin-bottom:clamp(36px,5vw,52px)\">\n      <div style=\"font:700 12px 'Space Mono',monospace;letter-spacing:.14em;color:#a1a1aa;margin-bottom:14px\">SERVICIOS<\u002Fdiv>\n      <h2 style=\"font:700 clamp(30px,4.5vw,42px) 'Bricolage Grotesque',sans-serif;letter-spacing:-.02em;margin:0 0 12px\">En qué te puedo ayudar<\u002Fh2>\n      <p style=\"font:400 17px 'Hanken Grotesk',sans-serif;color:#52525b;margin:0\">Cinco formas de sacarte trabajo de encima.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px\">\n      <div data-reveal=\"0\" style=\"background:#fff;border-radius:20px;padding:32px;border:1px solid #e6e6e8;transition:transform .28s ease,box-shadow .28s ease,border-color .28s ease\" style-hover=\"transform:translateY(-5px);box-shadow:0 22px 44px -26px rgba(36,31,26,.4);border-color:#d4d4d8\"><div style=\"width:48px;height:48px;border-radius:14px;background:#ebebed;display:flex;align-items:center;justify-content:center;font-size:23px;margin-bottom:18px\">🚀<\u002Fdiv><h3 style=\"font:600 20px 'Bricolage Grotesque',sans-serif;margin:0 0 9px\">Creación de SaaS<\u002Fh3><p style=\"font:400 15.5px/1.55 'Hanken Grotesk',sans-serif;color:#52525b;margin:0\">De la idea al producto: construyo tu plataforma web completa, del MVP al lanzamiento.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"0.06\" style=\"background:#fff;border-radius:20px;padding:32px;border:1px solid #e6e6e8;transition:transform .28s ease,box-shadow .28s ease,border-color .28s ease\" style-hover=\"transform:translateY(-5px);box-shadow:0 22px 44px -26px rgba(36,31,26,.4);border-color:#d4d4d8\"><div style=\"width:48px;height:48px;border-radius:14px;background:#ebebed;display:flex;align-items:center;justify-content:center;font-size:23px;margin-bottom:18px\">🤖<\u002Fdiv><h3 style=\"font:600 20px 'Bricolage Grotesque',sans-serif;margin:0 0 9px\">Implementación de IA y agentes<\u002Fh3><p style=\"font:400 15.5px/1.55 'Hanken Grotesk',sans-serif;color:#52525b;margin:0\">Agentes que clasifican, responden y ejecutan tareas por ti: correos, cotizaciones, seguimiento.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"0.12\" style=\"background:#fff;border-radius:20px;padding:32px;border:1px solid #e6e6e8;transition:transform .28s ease,box-shadow .28s ease,border-color .28s ease\" style-hover=\"transform:translateY(-5px);box-shadow:0 22px 44px -26px rgba(36,31,26,.4);border-color:#d4d4d8\"><div style=\"width:48px;height:48px;border-radius:14px;background:#ebebed;display:flex;align-items:center;justify-content:center;font-size:23px;margin-bottom:18px\">⚙️<\u002Fdiv><h3 style=\"font:600 20px 'Bricolage Grotesque',sans-serif;margin:0 0 9px\">Automatizaciones<\u002Fh3><p style=\"font:400 15.5px/1.55 'Hanken Grotesk',sans-serif;color:#52525b;margin:0\">Conecto tus herramientas —CRM, correo, planillas, facturación— y elimino el trabajo manual.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"0\" style=\"background:#fff;border-radius:20px;padding:32px;border:1px solid #e6e6e8;transition:transform .28s ease,box-shadow .28s ease,border-color .28s ease\" style-hover=\"transform:translateY(-5px);box-shadow:0 22px 44px -26px rgba(36,31,26,.4);border-color:#d4d4d8\"><div style=\"width:48px;height:48px;border-radius:14px;background:#ebebed;display:flex;align-items:center;justify-content:center;font-size:23px;margin-bottom:18px\">🌐<\u002Fdiv><h3 style=\"font:600 20px 'Bricolage Grotesque',sans-serif;margin:0 0 9px\">Desarrollo web<\u002Fh3><p style=\"font:400 15.5px/1.55 'Hanken Grotesk',sans-serif;color:#52525b;margin:0\">Sitios y aplicaciones web a la medida de tu negocio, rápidos y fáciles de mantener.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"0.06\" style=\"background:#fff;border-radius:20px;padding:32px;border:1px solid #e6e6e8;transition:transform .28s ease,box-shadow .28s ease,border-color .28s ease\" style-hover=\"transform:translateY(-5px);box-shadow:0 22px 44px -26px rgba(36,31,26,.4);border-color:#d4d4d8\"><div style=\"width:48px;height:48px;border-radius:14px;background:#ebebed;display:flex;align-items:center;justify-content:center;font-size:23px;margin-bottom:18px\">📊<\u002Fdiv><h3 style=\"font:600 20px 'Bricolage Grotesque',sans-serif;margin:0 0 9px\">Dashboards<\u002Fh3><p style=\"font:400 15.5px/1.55 'Hanken Grotesk',sans-serif;color:#52525b;margin:0\">Paneles que reúnen tus datos y te muestran qué pasa en tu negocio en tiempo real.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"0.12\" style=\"background:var(--brand);color:#f4f4f5;border-radius:20px;padding:32px;display:flex;flex-direction:column;justify-content:center\"><h3 style=\"font:600 20px 'Bricolage Grotesque',sans-serif;margin:0 0 9px\">¿No serif;color:#dedee1\">02<\u002Fspan><div style=\"font:700 12px 'Space Mono',monospace;color:#111111;margin-bottom:14px;letter-spacing:.06em\">PROPUESTA<\u002Fdiv><h3 style=\"font:600 18px 'Bricolage Grotesque',sans-serif;margin:0 0 8px\">Diseño la solución<\u002Fh3><p style=\"font:400 14.5px/1.55 'Hanken Grotesk',sans-serif;color:#52525b;margin:0\">Alcance y retorno esperado, claros y sin letra chica.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"0.12\" style=\"position:relative;background:#f4f4f5;border-radius:18px;padding:30px 28px;overflow:hidden\"><span style=\"position:absolute;top:14px;right:18px;font:700 44px 'Bricolage Grotesque',sans-serif;color:#dedee1\">03<\u002Fspan><div style=\"font:700 12px 'Space Mono',monospace;color:#111111;margin-bottom:14px;letter-spacing:.06em\">IMPLEMENTACIÓN<\u002Fdiv><h3 style=\"font:600 18px 'Bricolage Grotesque',sans-serif;margin:0 0 8px\">Construyo e integro<\u002Fh3><p style=\"font:400 14.5px/1.55 'Hanken Grotesk',sans-serif;color:#52525b;margin:0\">Todo probado en tu entorno real, paso a paso.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"0.18\" style=\"position:relative;background:#f4f4f5;border-radius:18px;padding:30px 28px;overflow:hidden\"><span style=\"position:absolute;top:14px;right:18px;font:700 44px 'Bricolage Grotesque',sans-serif;color:#dedee1\">04<\u002Fspan><div style=\"font:700 12px 'Space Mono',monospace;color:#111111;margin-bottom:14px;letter-spacing:.06em\">ACOMPAÑAMIENTO<\u002Fdiv><h3 style=\"font:600 18px 'Bricolage Grotesque',sans-serif;margin:0 0 8px\">Mido y optimizo<\u002Fh3><p style=\"font:400 14.5px/1.55 'Hanken Grotesk',sans-serif;color:#52525b;margin:0\">Te dejo con algo que funciona solo y sigue mejorando.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== RESULTADOS ===== -->\n  <div id=\"resultados\" style=\"max-width:1120px;margin:0 auto;padding:clamp(48px,7vw,80px) clamp(20px,4vw,44px);text-align:center;scroll-margin-top:72px\">\n    <div data-reveal= on:column;gap:16px\">\n        <div style=\"display:flex;flex-direction:column;gap:7px\"><label style=\"font:700 12px 'Space Mono',monospace;color:#71717a;text-transform:uppercase;letter-spacing:.08em\">Nombre<\u002Flabel><input value=\"{{ nombre }}\" oninput=\"{{ onNombre }}\" placeholder=\"Tu nombre\" style=\"background:#111111;border:1px solid #3f3f46;border-radius:10px;padding:14px 15px;font-size:15px;color:#f4f4f5;transition:border-color .2s\"><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:7px\"><label style=\"font:700 12px 'Space Mono',monospace;color:#71717a;text-transform:uppercase;letter-spacing:.08em\">Negocio o rubro<\u002Flabel><input value=\"{{ negocio }}\" oninput=\"{{ onNegocio }}\" placeholder=\"¿A qué te dedicas?\" style=\"background:#111111;border:1px solid #3f3f46;border-radius:10px;padding:14px 15px;font-size:15px;color:#f4f4f5;transition:border-color .2s\"><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:7px\"><label style=\"font:700 12px 'Space Mono',monospace;color:#71717a;text-transform:uppercase;letter-spacing:.08em\">¿Qué quieres automatizar?<\u002Flabel><textarea value=\"{{ mensaje }}\" oninput=\"{{ onMensaje }}\" placeholder=\"Cuéntame brevemente\" rows=\"3\" style=\"background:#111111;border:1px solid #3f3f46;border-radius:10px;padding:14px 15px;font-size:15px;color:#f4f4f5;resize:vertical;min-height:88px;transition:border-color .2s\"><\u002Ftextarea><\u002Fdiv>\n        <button onclick=\"{{ enviar }}\" style=\"margin-top:4px;padding:16px;background:#f4f4f5;color:#111111;border:none;border-radius:100px;font:700 15px 'Hanken Grotesk',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s\" style-hover=\"opacity:.85\">💬 Enviar por WhatsApp<\u002Fbutton>\n        <p style=\"font:400 12.5px/1.5 'Hanken Grotesk',sans-serif;color:#71717a;text-align:center;margin:0\">Se abrirá WhatsApp con tu mensaje listo para enviar.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"border-top:1px solid #2f2f33\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:26px clamp(20px,4vw,44px);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;font:500 13.5px 'Hanken Grotesk',sans-serif;color:#71717a\">\n        <span style=\"font:700 15px 'Bricolage Grotesque',sans-serif;color:#f4f4f5\">Sebastián Gómez<\u002Fspan>\n        <div style=\"display:flex;align-items:center;gap:20px;flex-wrap:wrap\">\n          <a href=\"https://www.linkedin.com/in/sebastián-gonzalo-gómez-pastén/\" target=\"_blank\" rel=\"noopener\" style=\"transition:color .2s\" style-hover=\"color:#f4f4f5\">LinkedIn<\u002Fa>\n          <span>Automatización · IA · Software · © 2026<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;brand&quot;: {\n    &quot;editor&quot;: &quot;color&quot;,\n    &quot;default&quot;: &quot;#111111&quot;,\n    &quot;tsType&quot;: &quot;string&quot;,\n    &quot;section&quot;: &quot;Estilo&quot;,\n    &quot;options&quot;: [&quot;#111111&quot;, &quot;#3f3f46&quot;, &quot;#71717a&quot;]\n  },\n  &quot;mostrarDisponible&quot;: {\n    &quot;editor&quot;: &quot;boolean&quot;,\n    &quot;default&quot;: true,\n    &quot;tsType&quot;: &quot;boolean&quot;,\n    &quot;section&quot;: &quot;Secciones&quot;\n  },\n  &quot;mostrarConfianza&quot;: {\n    &quot;editor&quot;: &quot;boolean&quot;,\n    &quot;default&quot;: true,\n    &quot;tsType&quot;: &quot;boolean&quot;,\n    &quot;section&quot;: &quot;Secciones&quot;\n  }\n}\">\nclass Component extends DCLogic {\n  state = { nombre: '', negocio: '', mensaje: '' };\n\n  componentDidMount() {\n    // --- tweakable props ---\n    const brand = this.props.brand ?? '#111111';\n    document.body.style.setProperty('--brand', brand);\n    const badge = document.getElementById('hero-badge');\n    if (badge) badge.style.display = (this.props.mostrarDisponible ?? true) ? '' : 'none';\n    const trust = document.getElementById('trust-strip');\n    if (trust) trust.style.display = (this.props.mostrarConfianza ?? true) ? '' : 'none';\n\n    // --- interactive dot grid ---\n    this.setupDotGrid();\n    // --- page background dots ---\n    this.setupBgDots();\n\n    // --- scroll reveal (set hidden pre-paint to avoid flash) ---\n    const reveal = [...document.querySelectorAll('[data-reveal]')];\n    reveal.forEach((el) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(22px)';\n      el.style.transition = 'opacity .75s cubic-bezier(.2,.7,.2,1), transform .75s cubic-bezier(.2,.7,.2,1)';\n    });\n    const show = (el) => {\n      el.style.transitionDelay = (parseFloat(el.dataset.reveal) || 0) + 's';\n      el.style.opacity = '1';\n      el.style.transform = 'none';\n    };\n    if ('IntersectionObserver' in window) {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach((e) => { if (e.isIntersecting) { show(e.target); io.unobserve(e.target); } });\n      }, { threshold: 0.14, rootMargin: '0px 0px -6% 0px' });\n      reveal.forEach((el) => io.observe(el));\n      // safety: reveal anything still hidden\n      setTimeout(() => reveal.forEach((el) => { if (el.style.opacity === '0') show(el); }), 2800);\n    } else {\n      reveal.forEach(show);\n    }\n\n    // --- active nav link highlight ---\n    const links = {};\n    document.querySelectorAll('[data-navlink]').forEach((a) => { links[a.dataset.navlink] = a; });\n    if ('IntersectionObserver' in window) {\n      const secObs = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            Object.values(links).forEach((a) => { a.style.color = ''; a.style.fontWeight = '500'; });\n            const a = links[e.target.id];\n            if (a) { a.style.color = '#111111'; a.style.fontWeight = '700'; }\n          }\n        });\n      }, { threshold: 0.001, rootMargin: '-45% 0px -50% 0px' });\n      ['servicios', 'proceso', 'resultados', 'proyectos', 'sobre-mi', 'contacto'].forEach((id) => {\n        const s = document.getElementById(id);\n        if (s) secObs.observe(s);\n      });\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._bgRaf) cancelAnimationFrame(this._bgRaf);\n    if (this._ro) this._ro.disconnect();\n  }\n\n  setupDotGrid() {\n    const cvs = document.getElementById('dotgrid');\n    const panel = document.getElementById('dotgrid-panel');\n    if (!cvs || !panel) return;\n    const ctx = cvs.getContext('2d');\n    const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    const GAP = 24, R = 116, PUSH = 26;\n    let dots = [], w = 0, h = 0;\n    const mouse = { x: -9999, y: -9999 };\n\n    const build = () => {\n      const rect = panel.getBoundingClientRect();\n      w = rect.width; h = rect.height;\n      if (!w || !h) return;\n      cvs.width = w * dpr; cvs.height = h * dpr;\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      dots = [];\n      const cols = Math.max(2, Math.round(w / GAP));\n      const rows = Math.max(2, Math.round(h / GAP));\n      const gx = w / (cols - 1), gy = h / (rows - 1);\n      for (let i = 0; i < cols; i++) {\n        for (let j = 0; j < rows; j++) {\n          const ox = i * gx, oy = j * gy;\n          dots.push({ ox, oy, x: ox, y: oy, vx: 0, vy: 0 });\n        }\n      }\n    };\n\n    let t = 0;\n    const frame = () => {\n      t += 0.016;\n      ctx.clearRect(0, 0, w, h);\n      for (const d of dots) {\n        // ambient drift — gentle wave so the grid breathes on its own\n        const wave = Math.sin(t * 1.1 + d.ox * 0.03 + d.oy * 0.045);\n        const wave2 = Math.cos(t * 0.8 + d.oy * 0.035);\n        let tx = d.ox + wave * 3.2, ty = d.oy + wave2 * 3.2;\n        let glow = 0.12 + Math.max(0, wave) * 0.16;\n        const dx = d.x - mouse.x, dy = d.y - mouse.y;\n        const dist = Math.hypot(dx, dy) || 0.0001;\n        if (dist < R) {\n          const f = 1 - dist / R;\n          tx += (dx / dist) * f * PUSH;\n          ty += (dy / dist) * f * PUSH;\n          glow = Math.max(glow, f);\n        }\n        d.vx = (d.vx + (tx - d.x) * 0.14) * 0.74;\n        d.vy = (d.vy + (ty - d.y) * 0.14) * 0.74;\n        d.x += d.vx; d.y += d.vy;\n        const r = 1.5 + glow * 2.4;\n        const a = 0.22 + glow * 0.78;\n        ctx.beginPath();\n        ctx.arc(d.x, d.y, r, 0, 6.2832);\n        ctx.fillStyle = 'rgba(244,244,245,' + a + ')';\n        ctx.fill();\n      }\n      this._raf = requestAnimationFrame(frame);\n    };\n\n    panel.addEventListener('pointermove', (e) => {\n      const rect = panel.getBoundingClientRect();\n      mouse.x = e.clientX - rect.left;\n      mouse.y = e.clientY - rect.top;\n    });\n    panel.addEventListener('pointerleave', () => { mouse.x = -9999; mouse.y = -9999; });\n\n    build();\n    if ('ResizeObserver' in window) {\n      this._ro = new ResizeObserver(build);\n      this._ro.observe(panel);\n    }\n    if (this._raf) cancelAnimationFrame(this._raf);\n    this._raf = requestAnimationFrame(frame);\n  }\n\n  setupBgDots() {\n    const cvs = document.getElementById('bg-dots');\n    if (!cvs) return;\n    const ctx = cvs.getContext('2d');\n    const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    const GAP = 34, R = 130, PUSH = 16;\n    let dots = [], w = 0, h = 0;\n    const mouse = { x: -9999, y: -9999 };\n\n    const build = () => {\n      w = window.innerWidth; h = window.innerHeight;\n      cvs.width = w * dpr; cvs.height = h * dpr;\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      dots = [];\n      const cols = Math.ceil(w / GAP) + 1;\n      const rows = Math.ceil(h / GAP) + 1;\n      for (let i = 0; i < cols; i++) {\n        for (let j = 0; j < rows; j++) {\n          const ox = i * GAP, oy = j * GAP;\n          dots.push({ ox, oy, x: ox, y: oy, vx: 0, vy: 0 });\n        }\n      }\n    };\n\n    let t = 0;\n    const frame = () => {\n      t += 0.016;\n      ctx.clearRect(0, 0, w, h);\n      for (const d of dots) {\n        const wave = Math.sin(t * 0.7 + d.ox * 0.02 + d.oy * 0.03);\n        let tx = d.ox + wave * 2.4, ty = d.oy + Math.cos(t * 0.5 + d.oy * 0.025) * 2.4;\n        let glow = 0;\n        const dx = d.x - mouse.x, dy = d.y - mouse.y;\n        const dist = Math.hypot(dx, dy) || 0.0001;\n        if (dist < R) {\n          const f = 1 - dist / R;\n          tx += (dx / dist) * f * PUSH;\n          ty += (dy / dist) * f * PUSH;\n          glow = f;\n        }\n        d.vx = (d.vx + (tx - d.x) * 0.12) * 0.76;\n        d.vy = (d.vy + (ty - d.y) * 0.12) * 0.76;\n        d.x += d.vx; d.y += d.vy;\n        const r = 1.1 + glow * 1.4;\n        const a = 0.05 + glow * 0.22;\n        ctx.beginPath();\n        ctx.arc(d.x, d.y, r, 0, 6.2832);\n        ctx.fillStyle = 'rgba(17,17,17,' + a + ')';\n        ctx.fill();\n      }\n      this._bgRaf = requestAnimationFrame(frame);\n    };\n\n    window.addEventListener('pointermove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });\n    window.addEventListener('resize', build);\n    build();\n    if (this._bgRaf) cancelAnimationFrame(this._bgRaf);\n    this._bgRaf = requestAnimationFrame(frame);\n  }\n\n  renderVals() {\n    const { nombre, negocio, mensaje } = this.state;\n    return {\n      nombre, negocio, mensaje,\n      onNombre: (e) => this.setState({ nombre: e.target.value }),\n      onNegocio: (e) => this.setState({ negocio: e.target.value }),\n      onMensaje: (e) => this.setState({ mensaje: e.target.value }),\n      enviar: () => {\n        const lines = [\n          'Hola Sebastián, quiero automatizar mi negocio.',\n          nombre ? 'Nombre: ' + nombre : '',\n          negocio ? 'Negocio: ' + negocio : '',\n          mensaje ? 'Necesito: ' + mensaje : '',\n        ].filter(Boolean);\n        const url = 'https://wa.me/56963060767?text=' + encodeURIComponent(lines.join('\\n'));\n        window.open(url, '_blank');\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
