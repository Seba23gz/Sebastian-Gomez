<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sebastián Gómez</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1a1a1a 0%, #111111 50%, #090909 100%);
      font-family: "Segoe UI", Arial, sans-serif;
      color: #f4f4f5;
      overflow: hidden;
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 18px;
      padding: 32px;
      max-width: 520px;
    }
    .avatar {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      overflow: hidden;
      border: 5px solid rgba(244, 244, 245, 0.92);
      box-shadow: 0 0 0 10px rgba(244, 244, 245, 0.06), 0 20px 45px rgba(0, 0, 0, 0.45);
      background: #222;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    h1 { margin: 0; font-size: 2.2rem; letter-spacing: 0.03em; }
    p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.9;
      max-width: 420px;
    }
    .badge {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.16);
      font-size: 0.95rem;
      color: #d8d8dc;
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="avatar">
      <img src="D020AC5E-CB0D-48C2-B255-819C465D8DE1_1_105_c.jpeg" alt="Sebastián Gómez">
    </div>
    <div class="badge">Bienvenid@ a mi portafolio</div>
    <h1>Sebastián Gómez</h1>
    <p>Diseño y desarrollo experiencias digitales con enfoque en claridad, detalle y resultado.</p>
  </main>
</body>
</html>
