<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sebastián Gómez</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111111;
      font-family: Arial, Helvetica, sans-serif;
      color: #f4f4f5;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }

    .avatar {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #f4f4f5;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      background: #222;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.02em;
    }

    p {
      margin: 0;
      font-size: 1rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="avatar">
      <img src="D020AC5E-CB0D-48C2-B255-819C465D8DE1_1_105_c.jpeg" alt="Sebastián Gómez">
    </div>
    <h1>Sebastián Gómez</h1>
    <p>Tu imagen ya aparece dentro del círculo.</p>
  </main>
</body>
</html>
