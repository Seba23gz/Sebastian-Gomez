  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

le=\"background:#111111;border:1px solid #3f3f46;border-radius:10px;padding:14px 15px;font-size:15px;color:#f4f4f5;resize:vertical;min-height:88px;transition:border-color .2s\"><\/textarea><\/div>\n        <button onclick=\"{{ enviar }}\" style=\"margin-top:4px;padding:16px;background:#f4f4f5;color:#111111;border:none;border-radius:100px;font:700 15px 'Hanken Grotesk',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s\" style-hover=\"opacity:.85\">\ud83d\udcac Enviar por WhatsApp<\/button>\n        <p style=\"font:400 12.5px\/1.5 'Hanken Grotesk',sans-serif;color:#71717a;text-align:center;margin:0\">Se abrir\u00e1 WhatsApp con tu mensaje listo para enviar.<\/p>\n      <\/div>\n    <\/div>\n\n    <div style=\"border-top:1px solid #2f2f33\">\n      <div style=\"max-width:1120px;margin:0 auto;padding:26px clamp(20px,4vw,44px);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;font:500 13.5px 'Hanken Grotesk',sans-serif;color:#71717a\">\n        <span style=\"font:700 15px 'Bricolage Grotesque',sans-serif;color:#f4f4f5\">Sebasti\u00e1n G\u00f3mez<\/span>\n        <div style=\"display:flex;align-items:center;gap:20px;flex-wrap:wrap\">\n          <a href=\"https:\/\/www.linkedin.com\/in\/sebasti\u00e1n-gonzalo-g\u00f3mez-past\u00e9n\/\" target=\"_blank\" rel=\"noopener\" style=\"transition:color .2s\" style-hover=\"color:#f4f4f5\">LinkedIn<\/a>\n          <span>Automatizaci\u00f3n \u00b7 IA \u00b7 Software \u00b7 \u00a9 2026<\/span>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n\n<\/div>\n<\/x-dc>\n<script type=\"text\/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;brand&quot;: {\n    &quot;editor&quot;: &quot;color&quot;,\n    &quot;default&quot;: &quot;#111111&quot;,\n    &quot;tsType&quot;: &quot;string&quot;,\n    &quot;section&quot;: &quot;Estilo&quot;,\n    &quot;options&quot;: [&quot;#111111&quot;, &quot;#3f3f46&quot;, &quot;#71717a&quot;]\n  },\n  &quot;mostrarDisponible&quot;: {\n    &quot;editor&quot;: &quot;boolean&quot;,\n    &quot;default&quot;: true,\n    &quot;tsType&quot;: &quot;boolean&quot;,\n    &quot;section&quot;: &quot;Secciones&quot;\n  },\n  &quot;mostrarConfianza&quot;: {\n    &quot;editor&quot;: &quot;boolean&quot;,\n    &quot;default&quot;: true,\n    &quot;tsType&quot;: &quot;boolean&quot;,\n    &quot;section&quot;: &quot;Secciones&quot;\n  }\n}\">\nclass Component extends DCLogic {\n  state = { nombre: '', negocio: '', mensaje: '' };\n\n  componentDidMount() {\n    \/\/ --- tweakable props ---\n    const brand = this.props.brand ?? '#111111';\n    document.body.style.setProperty('--brand', brand);\n    const badge = document.getElementById('hero-badge');\n    if (badge) badge.style.display = (this.props.mostrarDisponible ?? true) ? '' : 'none';\n    const trust = document.getElementById('trust-strip');\n    if (trust) trust.style.display = (this.props.mostrarConfianza ?? true) ? '' : 'none';\n\n    \/\/ --- interactive dot grid ---\n    this.setupDotGrid();\n    \/\/ --- page background dots ---\n    this.setupBgDots();\n\n    \/\/ --- scroll reveal (set hidden pre-paint to avoid flash) ---\n    const reveal = [...document.querySelectorAll('[data-reveal]')];\n    reveal.forEach((el) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(22px)';\n      el.style.transition = 'opacity .75s cubic-bezier(.2,.7,.2,1), transform .75s cubic-bezier(.2,.7,.2,1)';\n    });\n    const show = (el) => {\n      el.style.transitionDelay = (parseFloat(el.dataset.reveal) || 0) + 's';\n      el.style.opacity = '1';\n      el.style.transform = 'none';\n    };\n    if ('IntersectionObserver' in window) {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach((e) => { if (e.isIntersecting) { show(e.target); io.unobserve(e.target); } });\n      }, { threshold: 0.14, rootMargin: '0px 0px -6% 0px' });\n      reveal.forEach((el) => io.observe(el));\n      \/\/ safety: reveal anything still hidden\n      setTimeout(() => reveal.forEach((el) => { if (el.style.opacity === '0') show(el); }), 2800);\n    } else {\n      reveal.forEach(show);\n    }\n\n    \/\/ --- active nav link highlight ---\n    const links = {};\n    document.querySelectorAll('[data-navlink]').forEach((a) => { links[a.dataset.navlink] = a; });\n    if ('IntersectionObserver' in window) {\n      const secObs = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            Object.values(links).forEach((a) => { a.style.color = ''; a.style.fontWeight = '500'; });\n            const a = links[e.target.id];\n            if (a) { a.style.color = '#111111'; a.style.fontWeight = '700'; }\n          }\n        });\n      }, { threshold: 0.001, rootMargin: '-45% 0px -50% 0px' });\n      ['servicios', 'proceso', 'resultados', 'proyectos', 'sobre-mi', 'contacto'].forEach((id) => {\n        const s = document.getElementById(id);\n        if (s) secObs.observe(s);\n      });\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._bgRaf) cancelAnimationFrame(this._bgRaf);\n    if (this._ro) this._ro.disconnect();\n  }\n\n  setupDotGrid() {\n    const cvs = document.getElementById('dotgrid');\n    const panel = document.getElementById('dotgrid-panel');\n    if (!cvs || !panel) return;\n    const ctx = cvs.getContext('2d');\n    const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    const GAP = 24, R = 116, PUSH = 26;\n    let dots = [], w = 0, h = 0;\n    const mouse = { x: -9999, y: -9999 };\n\n    const build = () => {\n      const rect = panel.getBoundingClientRect();\n      w = rect.width; h = rect.height;\n      if (!w || !h) return;\n      cvs.width = w * dpr; cvs.height = h * dpr;\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      dots = [];\n      const cols = Math.max(2, Math.round(w \/ GAP));\n      const rows = Math.max(2, Math.round(h \/ GAP));\n      const gx = w \/ (cols - 1), gy = h \/ (rows - 1);\n      for (let i = 0; i < cols; i++) {\n        for (let j = 0; j < rows; j++) {\n          const ox = i * gx, oy = j * gy;\n          dots.push({ ox, oy, x: ox, y: oy, vx: 0, vy: 0 });\n        }\n      }\n    };\n\n    let t = 0;\n    const frame = () => {\n      t += 0.016;\n      ctx.clearRect(0, 0, w, h);\n      for (const d of dots) {\n        \/\/ ambient drift \u2014 gentle wave so the grid breathes on its own\n        const wave = Math.sin(t * 1.1 + d.ox * 0.03 + d.oy * 0.045);\n        const wave2 = Math.cos(t * 0.8 + d.oy * 0.035);\n        let tx = d.ox + wave * 3.2, ty = d.oy + wave2 * 3.2;\n        let glow = 0.12 + Math.max(0, wave) * 0.16;\n        const dx = d.x - mouse.x, dy = d.y - mouse.y;\n        const dist = Math.hypot(dx, dy) || 0.0001;\n        if (dist < R) {\n          const f = 1 - dist \/ R;\n          tx += (dx \/ dist) * f * PUSH;\n          ty += (dy \/ dist) * f * PUSH;\n          glow = Math.max(glow, f);\n        }\n        d.vx = (d.vx + (tx - d.x) * 0.14) * 0.74;\n        d.vy = (d.vy + (ty - d.y) * 0.14) * 0.74;\n        d.x += d.vx; d.y += d.vy;\n        const r = 1.5 + glow * 2.4;\n        const a = 0.22 + glow * 0.78;\n        ctx.beginPath();\n        ctx.arc(d.x, d.y, r, 0, 6.2832);\n        ctx.fillStyle = 'rgba(244,244,245,' + a + ')';\n        ctx.fill();\n      }\n      this._raf = requestAnimationFrame(frame);\n    };\n\n    panel.addEventListener('pointermove', (e) => {\n      const rect = panel.getBoundingClientRect();\n      mouse.x = e.clientX - rect.left;\n      mouse.y = e.clientY - rect.top;\n    });\n    panel.addEventListener('pointerleave', () => { mouse.x = -9999; mouse.y = -9999; });\n\n    build();\n    if ('ResizeObserver' in window) {\n      this._ro = new ResizeObserver(build);\n      this._ro.observe(panel);\n    }\n    if (this._raf) cancelAnimationFrame(this._raf);\n    this._raf = requestAnimationFrame(frame);\n  }\n\n  setupBgDots() {\n    const cvs = document.getElementById('bg-dots');\n    if (!cvs) return;\n    const ctx = cvs.getContext('2d');\n    const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    const GAP = 34, R = 130, PUSH = 16;\n    let dots = [], w = 0, h = 0;\n    const mouse = { x: -9999, y: -9999 };\n\n    const build = () => {\n      w = window.innerWidth; h = window.innerHeight;\n      cvs.width = w * dpr; cvs.height = h * dpr;\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      dots = [];\n      const cols = Math.ceil(w \/ GAP) + 1;\n      const rows = Math.ceil(h \/ GAP) + 1;\n      for (let i = 0; i < cols; i++) {\n        for (let j = 0; j < rows; j++) {\n          const ox = i * GAP, oy = j * GAP;\n          dots.push({ ox, oy, x: ox, y: oy, vx: 0, vy: 0 });\n        }\n      }\n    };\n\n    let t = 0;\n    const frame = () => {\n      t += 0.016;\n      ctx.clearRect(0, 0, w, h);\n      for (const d of dots) {\n        const wave = Math.sin(t * 0.7 + d.ox * 0.02 + d.oy * 0.03);\n        let tx = d.ox + wave * 2.4, ty = d.oy + Math.cos(t * 0.5 + d.oy * 0.025) * 2.4;\n        let glow = 0;\n        const dx = d.x - mouse.x, dy = d.y - mouse.y;\n        const dist = Math.hypot(dx, dy) || 0.0001;\n        if (dist < R) {\n          const f = 1 - dist \/ R;\n          tx += (dx \/ dist) * f * PUSH;\n          ty += (dy \/ dist) * f * PUSH;\n          glow = f;\n        }\n        d.vx = (d.vx + (tx - d.x) * 0.12) * 0.76;\n        d.vy = (d.vy + (ty - d.y) * 0.12) * 0.76;\n        d.x += d.vx; d.y += d.vy;\n        const r = 1.1 + glow * 1.4;\n        const a = 0.05 + glow * 0.22;\n        ctx.beginPath();\n        ctx.arc(d.x, d.y, r, 0, 6.2832);\n        ctx.fillStyle = 'rgba(17,17,17,' + a + ')';\n        ctx.fill();\n      }\n      this._bgRaf = requestAnimationFrame(frame);\n    };\n\n    window.addEventListener('pointermove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });\n    window.addEventListener('resize', build);\n    build();\n    if (this._bgRaf) cancelAnimationFrame(this._bgRaf);\n    this._bgRaf = requestAnimationFrame(frame);\n  }\n\n  renderVals() {\n    const { nombre, negocio, mensaje } = this.state;\n    return {\n      nombre, negocio, mensaje,\n      onNombre: (e) => this.setState({ nombre: e.target.value }),\n      onNegocio: (e) => this.setState({ negocio: e.target.value }),\n      onMensaje: (e) => this.setState({ mensaje: e.target.value }),\n      enviar: () => {\n        const lines = [\n          'Hola Sebasti\u00e1n, quiero automatizar mi negocio.',\n          nombre ? 'Nombre: ' + nombre : '',\n          negocio ? 'Negocio: ' + negocio : '',\n          mensaje ? 'Necesito: ' + mensaje : '',\n        ].filter(Boolean);\n        const url = 'https:\/\/wa.me\/56963060767?text=' + encodeURIComponent(lines.join('\\n'));\n        window.open(url, '_blank');\n      },\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
